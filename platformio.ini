; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
lib_deps = 
	bblanchon/ArduinoJson@^6.19.4
	knolleary/PubSubClient@^2.8.0
	https://github.com/tzapu/WiFiManager
	z3t0/IRremote@^3.6.1
	eegee-tokyo/DHT sensor library for ESPx@^1.18.0

[env:d1_mini]
extends = env:nodemcuv2
board = d1_mini

[env:nisse]
extends = env:d1_mini
upload_protocol = espota
upload_port = nisse.local
upload_flags = 
	--auth=nisse
build_flags = 
	-D BOARD_ID='"nisse"'
	-D SERVO_ENABLED
	-D SERVO_PIN=5

[env:toiletgpio]
extends = env:d1_mini
upload_protocol = espota
upload_port = toiletgpio.local
upload_flags = 
	--auth=toiletgpio
build_flags = 
	-D BOARD_ID='"toiletgpio"'
	-D DHT_ENABLED
	-D DHT_PIN=16
	-D PIR_ENABLED
	-D PIR_PIN=4

[env:toslinkirda]
extends = env:d1_mini
upload_protocol = espota
upload_port = toslinkirda.local
upload_flags = 
	--auth=toslinkirda
build_flags = 
	-D BOARD_ID='"toslinkirda"'
	-D IRDA_ENABLED
	-D IRDA_SEND_PIN=5